<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Mustapha Ibrahim - Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f9;
    }

    /* NAVBAR */
    .navbar {
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .navbar .logo {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    /* HAMBURGER BUTTON */
    .menu-btn {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }
    .menu-btn span {
      width: 28px;
      height: 3px;
      background: white;
      border-radius: 2px;
      transition: 0.3s;
    }

    /* NAV LINKS */
    .nav-links {
      display: flex;
      gap: 25px;
      list-style: none;
    }
    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }
    .nav-links a:hover {
      color: #ffd700;
    }

    /* MOBILE MENU */
    @media(max-width: 900px) {
      .menu-btn { display: flex; }
      .nav-links {
        position: absolute;
        top: 60px;
        right: 0;
        background: #1e3a8a;
        width: 100%;
        flex-direction: column;
        align-items: center;
        gap: 0;
        max-height: 0;
        overflow: hidden;
        transition: 0.4s;
      }
      .nav-links.active {
        max-height: 400px;
        padding: 20px 0;
      }
      .nav-links li {
        width: 100%;
        text-align: center;
        padding: 15px 0;
        border-bottom: 1px solid rgba(255,255,255,0.1
